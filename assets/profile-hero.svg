<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">공만의 코드 노트</title>
  <desc id="desc">호기심을 코드로, 질문을 실험으로</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070B18"/>
      <stop offset="52%" stop-color="#111C4D"/>
      <stop offset="100%" stop-color="#321469"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F0ABFC" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="48"/></filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#C4B5FD" stroke-opacity="0.11" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="340" rx="22" fill="url(#background)"/>
  <circle cx="982" cy="58" r="132" fill="#7C3AED" fill-opacity="0.42" filter="url(#blur)"/>
  <circle cx="176" cy="330" r="126" fill="#0EA5E9" fill-opacity="0.25" filter="url(#blur)"/>
  <rect width="1200" height="340" rx="22" fill="url(#grid)"/>

  <path d="M 0 270 C 180 220, 306 322, 496 256 S 790 170, 1200 238" fill="none" stroke="url(#line)" stroke-width="1.4"/>
  <path d="M 0 286 C 190 236, 330 334, 520 272 S 830 190, 1200 256" fill="none" stroke="#67E8F9" stroke-opacity="0.16" stroke-width="1"/>
  <g fill="#E9D5FF">
    <circle cx="746" cy="93" r="4"/>
    <circle cx="813" cy="129" r="3"/>
    <circle cx="1054" cy="183" r="5"/>
  </g>
  <g fill="none" stroke="#A78BFA" stroke-opacity="0.45">
    <rect x="942" y="84" width="120" height="72" rx="12"/>
    <rect x="1038" y="197" width="86" height="52" rx="10"/>
  </g>
  <g font-family="Pretendard, Apple SD Gothic Neo, Malgun Gothic, sans-serif">
    <text x="82" y="104" fill="#A5B4FC" font-size="21" font-weight="700" letter-spacing="2.4">@LEEGONGMAN</text>
    <text x="80" y="187" fill="#FFFFFF" font-size="76" font-weight="700" letter-spacing="-3">공만의 코드 노트</text>
    <text x="83" y="235" fill="#D8B4FE" font-size="34" font-weight="500">호기심을 코드로, 질문을 실험으로</text>
  </g>
</svg>
